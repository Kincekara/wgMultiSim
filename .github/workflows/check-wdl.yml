name: WDL validation

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  miniwdl-check:
    name: MiniWDL validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MiniWDL
        run: |
          python -m pip install --upgrade pip
          pip install miniwdl

      - name: Validate WDL with MiniWDL
        run: |
          miniwdl check workflows/wf_wgmultisim.wdl

  cromwell-check:
    name: Cromwell validation
    runs-on: ubuntu-latest
    needs: miniwdl-check
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Download Cromwell
        run: |
          curl -LJO https://github.com/broadinstitute/cromwell/releases/download/92/womtool-92.jar

      - name: Validate WDL with Cromwell
        run: |
          java -jar womtool-92.jar validate workflows/wf_wgmultisim.wdl
